<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- BEGIN DOCMERSION FAVICONS -->
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon/android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/favicon/android-chrome-512x512.png">
    <link rel="manifest" href="/favicon/site.webmanifest">
    <link rel="shortcut icon" href="/favicon/favicon.ico">
    <!-- END DOCMERSION FAVICONS -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thank You – DocMersion</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: '#238CFF',
              dark: '#0a2239',
            },
            fontFamily: {
              inter: ['Inter', 'sans-serif'],
            },
          },
        },
      };
    </script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <!-- Navbar and Footer Loaders -->
    <script src="navbarloader.js"></script>
    <script src="footerloader.js"></script>
    <!-- PDF Genie -->
    <script src="https://pdf-genie-etm2.onrender.com/docbox.js"></script>
    <!-- Checkmark Animation Styles -->
    <style>
      @keyframes checkmark-circle {
        0% {
          stroke-dashoffset: 166;
        }
        100% {
          stroke-dashoffset: 0;
        }
      }

      @keyframes checkmark-check {
        0% {
          stroke-dashoffset: 80;
        }
        100% {
          stroke-dashoffset: 0;
        }
      }

      @keyframes checkmark-scale {
        0%, 100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.05);
        }
      }

      @keyframes fade-in-up {
        0% {
          opacity: 0;
          transform: translateY(20px);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .checkmark-svg {
        width: 120px;
        height: 120px;
        animation: checkmark-scale 0.5s ease-in-out 1s;
      }

      .checkmark-circle {
        stroke-dasharray: 166;
        stroke-dashoffset: 166;
        stroke-width: 3;
        stroke: #22c55e;
        fill: none;
        animation: checkmark-circle 0.6s cubic-bezier(0.65, 0, 0.45, 1) forwards;
      }

      .checkmark-check {
        stroke-dasharray: 80;
        stroke-dashoffset: 80;
        stroke-width: 4;
        stroke: #22c55e;
        fill: none;
        animation: checkmark-check 0.4s cubic-bezier(0.65, 0, 0.45, 1) 0.4s forwards;
      }

      .fade-in-up {
        opacity: 0;
        animation: fade-in-up 0.6s ease-out forwards;
      }

      .fade-in-up-delay-1 {
        animation-delay: 0.8s;
      }

      .fade-in-up-delay-2 {
        animation-delay: 1s;
      }

      .fade-in-up-delay-3 {
        animation-delay: 1.2s;
      }
    </style>
  </head>
  <body class="bg-white text-gray-900">
    <!-- Navbar will be loaded by navbarloader.js -->

    <!-- Thank You Section -->
    <main class="pt-32 pb-20 min-h-[80vh] bg-gradient-to-br from-blue-50 via-purple-50 to-pink-50 flex items-center">
      <div class="container mx-auto px-4 max-w-3xl">
        <div class="bg-white rounded-3xl shadow-2xl p-10 md:p-16 text-center border border-gray-100">
          <!-- Animated Checkmark -->
          <div class="flex justify-center mb-8">
            <div class="relative">
              <div class="absolute inset-0 bg-green-100 rounded-full blur-xl opacity-60"></div>
              <svg class="checkmark-svg relative" viewBox="0 0 52 52">
                <circle class="checkmark-circle" cx="26" cy="26" r="25"/>
                <path class="checkmark-check" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
              </svg>
            </div>
          </div>

          <!-- Thank You Message -->
          <h1 class="text-3xl md:text-4xl font-extrabold mb-4 text-gray-900 fade-in-up fade-in-up-delay-1">
            Thank You!
          </h1>
          <p class="text-lg md:text-xl text-gray-600 mb-8 fade-in-up fade-in-up-delay-2">
            Your message has been received. We'll be in touch with you shortly.
          </p>

          <!-- Back to Home Button -->
          <div class="fade-in-up fade-in-up-delay-3">
            <a href="/" class="inline-flex items-center gap-2 px-8 py-4 bg-gradient-to-r from-blue-500 to-purple-600 text-white font-semibold rounded-full shadow-lg hover:shadow-xl transition-all duration-300 hover:scale-105">
              <i class="bi bi-house-door"></i>
              Back to Home
            </a>
          </div>
        </div>
      </div>
    </main>

    <!-- Footer will be loaded by footerloader.js -->
  </body>
</html>
